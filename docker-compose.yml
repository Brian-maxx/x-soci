version: "3.8"

services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    environment:
      - DEBUG=1
    depends_on: 
      - mysql_db

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend


  mysql_db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: '123'
      MYSQL_DATABASE: xsoci_db
    ports:
      - "33067:3306"
    volumes:
      - mysql_data:/var/lib/mysql 

volumes:
  mysql_data:

